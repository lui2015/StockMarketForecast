version: "3.8"
services:
  forecast:
    build: .
    container_name: forecast
    ports:
      - "3030:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - TZ=Asia/Shanghai         # 容器时区，保证 17:00 校验按北京时间触发
      - QUOTE_MODE=live          # 调用东方财富公开接口拉取真实涨跌幅
      - VERIFY_HOUR=17           # 每日 17:00（A股/港股收盘后）自动校验
      - VERIFY_MINUTE=0
      - ADMIN_PASS=admin123
      - SEED_AI_API_KEY=sk-ai-demo-0001
    restart: unless-stopped
